name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin --verbose
          - platform: ubuntu-22.04
            args: --verbose
          - platform: windows-latest
            args: --verbose
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - name: Set up Java (needed by jsign for Windows signing)
        if: matrix.platform == 'windows-latest'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download jsign (Windows signing)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          url=$(curl -s https://api.github.com/repos/ebourg/jsign/releases/latest \
            | jq -r '.assets[] | select(.name | test("\\.jar$")) | .browser_download_url' | head -n1)
          echo "Downloading $url"
          curl -sL "$url" -o jsign.jar
          echo "JSIGN_JAR=$(pwd -W)/jsign.jar" >> "$GITHUB_ENV"

      - run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Embedded at build time (see src-tauri/build.rs) so the shipped
          # app can complete Google sign-in.
          TAPEDECK_GOOGLE_CLIENT_ID: ${{ secrets.TAPEDECK_GOOGLE_CLIENT_ID }}
          TAPEDECK_GOOGLE_CLIENT_SECRET: ${{ secrets.TAPEDECK_GOOGLE_CLIENT_SECRET }}
          # Also embedded at build time — YouTube reads use this plain API
          # key, not the Google OAuth session (see src-tauri/src/youtube.rs).
          TAPEDECK_YOUTUBE_API_KEY: ${{ secrets.TAPEDECK_YOUTUBE_API_KEY }}

          # macOS signing + notarization, consumed directly by tauri-bundler.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          # Windows signing via Azure Trusted Signing, consumed by
          # scripts/sign-windows.mjs through the bundle.windows.signCommand
          # hook in src-tauri/tauri.conf.json.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TRUSTED_SIGNING_ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          TRUSTED_SIGNING_ACCOUNT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          TRUSTED_SIGNING_PROFILE: ${{ secrets.TRUSTED_SIGNING_PROFILE }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Tapedeck ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
