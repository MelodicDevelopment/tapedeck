name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck, lint, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  rust:
    name: Rust (fmt, clippy, test)
    # macOS matches the primary target and needs no extra system packages;
    # the Tauri context embeds the frontend, so dist/ must be built first.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run build
      - name: cargo fmt
        run: cargo fmt --check
        working-directory: src-tauri
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri
      - name: cargo test
        run: cargo test
        working-directory: src-tauri
